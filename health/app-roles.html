<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Greyquill Health Platform — Planning &amp; Audit Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary-50:#EFF6FF;--primary-100:#DBEAFE;--primary-200:#BFDBFE;--primary-500:#2563EB;
    --primary-600:#1D4ED8;--primary-700:#1E40AF;--primary-900:#172554;
    --critical:#B42318;--warning:#B54708;--success:#067647;--info:#175CD3;
    --n0:#FFFFFF;--n25:#FCFCFD;--n50:#F8FAFC;--n100:#F1F5F9;--n200:#E2E8F0;--n300:#CBD5E1;
    --n400:#94A3B8;--n500:#64748B;--n600:#475569;--n700:#334155;--n800:#1E293B;--n900:#0F172A;
    --sans:'Inter',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',ui-tabular figures,tabular figures;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);color:var(--n700);background:var(--n50);font-size:14px;line-height:1.55;display:flex}
  a{color:var(--primary-600)}
  code,.mono{font-family:var(--mono)}

  /* Sidebar */
  aside{width:288px;flex:0 0 288px;height:100vh;overflow-y:auto;background:var(--n0);border-right:1px solid var(--n200);padding:16px 0}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 18px 14px;border-bottom:1px solid var(--n100);margin-bottom:8px}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--primary-500),var(--primary-700));
    display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .brand b{color:var(--n900);font-size:14.5px;display:block;line-height:1.2}
  .brand span{color:var(--n500);font-size:11.5px}
  nav .group{padding:14px 18px 4px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--n400);font-weight:700}
  nav a.item{display:flex;align-items:center;gap:9px;padding:8px 18px;color:var(--n700);text-decoration:none;font-size:13.5px;cursor:pointer;border-left:3px solid transparent}
  nav a.item:hover{background:var(--n50)}
  nav a.item.active{background:var(--primary-50);border-left-color:var(--primary-600);color:var(--primary-900);font-weight:600}
  nav a.sub{padding-left:34px;font-size:13px;color:var(--n600)}
  nav a.pgroup{font-weight:600;color:var(--n800)}
  .stdot{width:9px;height:9px;border-radius:9999px;background:var(--n300);flex:0 0 auto;margin-left:auto}
  .stdot.approved{background:var(--success)}
  .stdot.changes{background:var(--warning)}
  .surf{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:4px;text-transform:uppercase;margin-left:auto}
  .surf.m{background:var(--primary-100);color:var(--primary-900)}
  .surf.w{background:#D1E9FF;color:#1849A9}

  /* Main */
  main{flex:1;height:100vh;overflow-y:auto}
  .wrap{max-width:1140px;margin:0 auto;padding:26px 30px 80px}
  h1{font-size:20px;color:var(--n900);margin:0 0 4px}
  .crumb{color:var(--n500);font-size:12.5px;margin-bottom:18px}
  .pill{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:9999px}
  .pill.m{background:var(--primary-100);color:var(--primary-900)}
  .pill.w{background:#D1E9FF;color:#1849A9}
  .card{background:var(--n0);border:1px solid var(--n200);border-radius:10px;padding:18px;margin-bottom:18px}
  .card h3{margin:0 0 10px;font-size:13.5px;color:var(--n900);display:flex;align-items:center;gap:8px}
  pre.prompt{background:var(--n50);border:1px solid var(--n200);border-radius:8px;padding:14px;margin:0;
    font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;color:var(--n800);max-height:340px;overflow:auto}
  .btnrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  button.b{font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--primary-600);background:var(--primary-600);color:#fff;
    padding:7px 13px;border-radius:7px;cursor:pointer}
  button.b:hover{background:var(--primary-700)}
  button.b.ghost{background:var(--n0);color:var(--primary-700);border-color:var(--n300)}
  button.b.ghost:hover{background:var(--primary-50)}
  .hint{font-size:12px;color:var(--n500);margin-top:8px}
  .hint code{background:var(--n100);padding:1px 5px;border-radius:4px;color:var(--n700)}

  /* Device frames */
  .stage{display:flex;justify-content:center;background:var(--n50);border:1px dashed var(--n300);border-radius:12px;padding:22px;min-height:220px;position:relative}
  .phone{width:392px;max-width:100%;height:780px;border:10px solid var(--n800);border-radius:38px;overflow:hidden;background:#fff;box-shadow:0 24px 48px -8px rgba(15,23,42,.20)}
  .phone iframe{width:100%;height:100%;border:0;background:#fff}
  .browser{width:100%;max-width:1040px;border:1px solid var(--n200);border-radius:10px;overflow:hidden;box-shadow:0 12px 24px -4px rgba(15,23,42,.14);background:#fff}
  .bbar{background:var(--n100);border-bottom:1px solid var(--n200);padding:8px 12px;display:flex;align-items:center;gap:7px}
  .bbar i{width:10px;height:10px;border-radius:9999px;display:inline-block}
  .bbar .u{flex:1;background:var(--n0);border:1px solid var(--n200);border-radius:6px;font-size:11px;color:var(--n500);padding:3px 9px;font-family:var(--mono)}
  .browser iframe{width:100%;height:660px;border:0;background:#fff;display:block}
  .ph-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--n400);gap:6px;padding:20px}
  .ph-empty b{color:var(--n600)}

  /* Audit */
  .audit{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .seg{display:inline-flex;border:1px solid var(--n300);border-radius:8px;overflow:hidden}
  .seg button{font:inherit;font-size:12.5px;border:0;background:var(--n0);color:var(--n600);padding:7px 12px;cursor:pointer;border-right:1px solid var(--n200)}
  .seg button:last-child{border-right:0}
  .seg button.on[data-v="approved"]{background:var(--success);color:#fff}
  .seg button.on[data-v="changes"]{background:var(--warning);color:#fff}
  .seg button.on[data-v="pending"]{background:var(--n500);color:#fff}
  textarea.notes{width:100%;margin-top:10px;border:1px solid var(--n300);border-radius:8px;padding:10px;font:inherit;font-size:13px;min-height:64px;resize:vertical}
  .swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .sw{border:1px solid var(--n200);border-radius:8px;overflow:hidden;font-size:11px}
  .sw .c{height:46px}
  .sw .l{padding:5px 7px}.sw .l b{display:block;color:var(--n800)}.sw .l span{color:var(--n500);font-family:var(--mono);font-size:10px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--n900);color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  iframe.full{width:100%;height:calc(100vh - 0px);border:0;display:block}
</style>
</head>
<body>
<aside>
  <div class="brand"><span class="logo">G</span><div><b>Health Platform</b><span>Planning &amp; Audit Hub</span></div></div>
  <nav id="nav"></nav>
</aside>
<main><div id="view"></div></main>
<div class="toast" id="toast"></div>

<script>
const DS_PROMPT = `Design a healthcare app screen for a white-label hospital platform. Use this design system exactly:

BRAND COLOR (primary): medical blue #1D4ED8 for primary buttons, links, and active navigation; hover #1E40AF; tinted backgrounds #EFF6FF and #DBEAFE. A #15AABF teal accent may be used sparingly for empathy/marketing moments only.

CLINICAL STATUS COLORS (do not change these — they carry safety meaning): critical/danger red #B42318, warning orange #B54708, success green #067647, info blue #175CD3. Always pair a status color with an icon AND a text label (never color alone — must be color-blind safe). The brand blue and info blue are both blue by convention; keep "info" as a lighter tinted chip with an icon + label so it never reads as a primary action.

NEUTRALS: page background #FFFFFF, sunken/sidebar #F8FAFC, borders #E2E8F0, body text #334155, headings #1E293B, secondary text #64748B.

TYPOGRAPHY: Use Inter (or a similar humanist sans) as the primary typeface throughout the UI — headings, body, labels, and numbers where appropriate. Do NOT use a tabular figuresd font; for numeric alignment of IDs, MRN, dosages, lab values and timestamps, use Inter with tabular figures (font-feature-settings: 'tnum','lnum') instead. Confident hierarchy: large tight-tracked bold headings, medium-weight labels, muted secondary text. Clinician screens 14px base; patient screens 16px base.

STYLE: calm, clinical, trustworthy — not playful, not dark "fintech". Prefer 1px hairline borders and tonal layers over heavy shadows; a subtle soft shadow is allowed on patient mobile cards and the hero card only. Card radius 8px (16px for patient mobile cards). Generous, rhythmic whitespace on a 4px grid.

AESTHETIC (important — the quality bar): modern, sleek and premium — production-grade, NOT a wireframe or generic Material template. Aim for the polish of Linear, Stripe and Apple Health while staying calm and clinical: a refined hero/primary card (subtle tonal wash or gradient OK there only), strong type-scale contrast and clear hierarchy, crisp consistent line icons (Lucide/Phosphor — never emoji), intentional spacing rhythm, status as tinted chip + icon + label, thoughtful empty/loading states. Avoid flat boxy stacks of identical cards, avoid clutter, avoid the default Material look.

ACCESSIBILITY: WCAG 2.1 AA contrast; 44px minimum touch targets on mobile; clear keyboard focus rings in blue (brand).

BRANDING: logo is a placeholder "Hospital Logo" top-left (white-label — the brand color is tenant-overridable, but the clinical status colors above are always fixed).`;

const PERSONAS = [
  {key:'patient',label:'Patient'},{key:'doctor',label:'Doctor'},{key:'nurse',label:'Nurse'},
  {key:'headnurse',label:'Head Nurse'},{key:'admin',label:'Hospital Admin'},{key:'pharmacy',label:'Pharmacy'},
  {key:'labs',label:'Labs'},{key:'technician',label:'Technician'},{key:'maintenance',label:'Maintenance'},
  {key:'clinic',label:'Clinic'},{key:'ambulance',label:'Ambulance'}
];

const SCREENS = [
{id:'patient-home-mobile',persona:'patient',title:'Home / Dashboard',surface:'Mobile',prompt:`Patient home dashboard. Card for the next upcoming appointment (doctor, date/time, "Join video" if telemedicine, and Reschedule/Cancel). Quick-action tiles: Book appointment, View records, Lab results, Pay bills. A "Recent lab results" list with status pills (Normal in green, High in orange, Critical in red — each with an icon and label). An outstanding-balance banner with a blue (brand) "Pay now" button. Bottom nav: Home, Appointments, Records, Profile. Plain language, 16px text, large rounded cards (16px).`},
{id:'patient-book-mobile',persona:'patient',title:'Find a Doctor & Book',surface:'Mobile',prompt:`Patient-facing booking screen. Top: greeting "Hi, Asha" + search bar "Search doctors, specialties, symptoms". Horizontal chips for specialties (General, Cardiology, Dental, Pediatrics). A vertical list of doctor cards: photo, name, specialty, star rating, next-available time, and a blue (brand) "Book" button. A sticky bottom nav: Home, Appointments, Records, Profile. Include a small "Book on WhatsApp" secondary option. Plain language, 16px text, large rounded cards (16px).`},
{id:'patient-appointments-mobile',persona:'patient',title:'Appointments',surface:'Mobile',prompt:`Patient appointments screen, mobile. Segmented control: Upcoming / Past. Upcoming = cards with doctor photo, name, specialty, date & time, a location line or a "Telemedicine" chip, and actions Reschedule / Cancel / Join video. Past = list rows with a "Visit summary" link and a "Book follow-up" button. A friendly empty state with a "Book appointment" CTA. Sticky bottom nav (Home, Appointments active, Records, Profile). 16px text, large rounded cards, soft depth.`},
{id:'patient-records-mobile',persona:'patient',title:'Records',surface:'Mobile',prompt:`Patient health records screen, mobile. Search field + filter chips: Lab results, Prescriptions, Conditions, Documents, Vitals. A date-grouped timeline: lab-result rows show test name, value (tabular figures) with unit, and a status pill (Normal green / High orange / Critical red — icon + label); prescription rows show drug, dose, prescriber; document rows show type + a download icon. Tapping a row opens its detail. Calm, readable, 16px, rounded cards.`},
{id:'patient-profile-mobile',persona:'patient',title:'Profile & Settings',surface:'Mobile',prompt:`Patient profile & settings screen, mobile. Header: avatar, name, MRN (tabular figures). Grouped list sections with leading line icons + chevrons: Personal details; Insurance & coverage; Emergency contacts; Language & accessibility; Notification preferences (SMS / WhatsApp / email / push toggles); Consents & data sharing; Security (MFA); Sign out. Calm, trustworthy, 16px.`},
{id:'patient-meds-mobile',persona:'patient',title:'Medications & Refills',surface:'Mobile',prompt:`Patient medications screen, mobile. "Active medications" list: drug name, dose (tabular figures), frequency, prescriber, next-refill date, and a "Request refill" button per item. A "Refill requests" section with status pills (Pending / Approved / Ready for pickup — icon + label). A persistent allergy reminder banner. Empty state. 16px, rounded cards, soft depth.`},
{id:'patient-payments-mobile',persona:'patient',title:'Payments & Plans',surface:'Mobile',prompt:`Patient payments screen, mobile. Hero card: outstanding balance with a blue (brand) "Pay now" and a "Set up payment plan" secondary. Tabs: Invoices / Payments / Plans. Invoices list: amount (tabular figures), date, status pill (Paid green / Due orange / Overdue red — icon + label), and View / Pay. Payment-plan card showing installments + next due. Saved payment methods (UPI / card / wallet). 16px.`},
{id:'patient-telemed-mobile',persona:'patient',title:'Telemedicine Consult',surface:'Mobile',prompt:`Patient telemedicine call screen, mobile. Pre-call: doctor card, "Test camera & mic", appointment time, blue (brand) "Join now". In-call: full-screen remote video with a self-view picture-in-picture and a control bar (mute, camera, end call), plus a side sheet for chat and shared documents/prescription. Post-call: "Visit summary", "Download prescription", and a short NPS feedback prompt. High contrast, large accessible controls.`},
{id:'patient-consult-mobile',persona:'patient',title:'Active Consultation',surface:'Mobile',prompt:`Patient active video consultation screen, mobile. Full-screen doctor video with a self-view picture-in-picture; top bar shows doctor name and call timer; bottom control bar (mute, camera flip, chat, end call in red). A slide-up panel for live chat and shared notes/prescription. A connection-quality indicator. High contrast, large accessible controls, 16px.`},
{id:'patient-visit-summary-mobile',persona:'patient',title:'Visit Summary',surface:'Mobile',prompt:`Patient visit summary screen, mobile. Header: doctor, date, visit type. Sections: Diagnosis/assessment; Prescribed medications (drug, dose in tabular figures, instructions); Orders (labs/imaging) with status; Follow-up appointment with a "Book" CTA; and a "Download PDF" action. Calm, readable, 16px, rounded cards.`},
{id:'doctor-chart-web',persona:'doctor',title:'Patient Chart (EHR 360)',surface:'Web',prompt:`Clinician EHR patient chart, dense and information-rich, desktop layout. Left sidebar: app nav. Header strip: patient name, MRN (tabular figures), age/sex, allergies shown as a red warning banner with icon ("Allergy: Penicillin — severe"). Main area is tabbed: Summary, Problems, Medications, Vitals, Labs, Notes, Documents. Show the Summary tab: a problem list, active medications, latest vitals as compact stat tiles (HR, BP, Temp, SpO2 with tabular numerals), and a recent-labs table with status flags (Normal/High/Low/Critical each with icon+color). Right rail: encounter timeline. A blue (brand) "New note" and "Place order" button in the header. Comfortable density with a compact toggle. 14px base.`},
{id:'doctor-schedule-web',persona:'doctor',title:'Schedule / Worklist',surface:'Web',prompt:`Doctor's daily schedule and worklist, desktop. A day-view column of time slots (08:00–18:00) with appointment blocks showing patient name, reason, and status chips (Confirmed, Checked-in, Completed, No-show — icon+color). A right panel lists "Today's patients" with quick links to open the chart. Top filters: date picker, location. Blue (brand) primary actions. Tabular, scannable, 14px.`},
{id:'nurse-vitals-mobile',persona:'nurse',title:'Vitals Entry & eMAR',surface:'Mobile',prompt:`Bedside nurse screen, mobile. Top: patient banner (name, MRN tabular figures, bed number, allergy chip in red). Two sections: (A) "Record vitals" with large numeric input fields for HR, BP, Temp, SpO2, RR and a blue (brand) "Save vitals" button; (B) "Medication pass (eMAR)" — a checklist of due medications with drug name, dose (tabular figures), route, scheduled time, and an "Administer" action with a barcode-scan icon. Overdue meds flagged in orange with icon. Big touch targets (44px), 16px text.`},
{id:'headnurse-ward-web',persona:'headnurse',title:'Ward Board',surface:'Web',prompt:`Head-nurse ward overview on a tablet/desktop. A grid of bed cards for one ward: bed code, patient name, acuity indicator (color+label: stable/watch/critical), assigned nurse avatar, and alert badges (e.g. critical lab in red with icon). Top bar: ward selector, occupancy summary (e.g. "24/30 occupied"), and an "Assign staff" blue (brand) button. A right panel: escalation queue (urgent items, each with icon+label+timestamp). Dense, calm, scannable.`},
{id:'admin-dashboard-web',persona:'admin',title:'Executive Dashboard',surface:'Web',prompt:`Hospital administrator analytics dashboard, desktop. Left nav sidebar. Top KPI tiles: Today's appointments, Bed occupancy %, Revenue (MTD), Claim denial rate, Avg wait time — each with a small trend sparkline and tabular numerals. Charts: revenue trend (line), appointments by department (bar), AR aging (stacked bar) using a color-blind-safe palette. A "Credential expirations" alert list (orange/red status with icon+label). A "Tenant settings" shortcut. Blue (brand) accents, white cards with 1px borders, comfortable density.`},
{id:'pharmacy-erx-web',persona:'pharmacy',title:'e-Rx Queue & Dispense',surface:'Web',prompt:`Pharmacy dispensing screen, desktop. Left: incoming e-prescription queue as a table (patient, prescriber, drug, dose in tabular figures, time, status). Right: selected prescription detail with interaction/allergy check results shown as alert banners (critical contraindication in red with icon, caution in amber), a dispense form (quantity, batch no, expiry), and a blue (brand) "Dispense" button. A low-stock/expiring inventory strip at the bottom with warning flags. Dense, 14px, tabular numerals.`},
{id:'labs-results-web',persona:'labs',title:'Result Entry & Validation',surface:'Web',prompt:`Laboratory result-entry screen, desktop. Worklist of specimens by accession number (tabular figures) with status (Pending, Collected, Received). Selected order shows a result-entry grid: test name, value input, unit, reference range, and an auto-computed flag (Normal/Low/High/Critical with icon+color). Critical values are highlighted red with a required "Notify provider" action. A blue (brand) "Verify & release" button. Compact density, tabular numerals.`},
{id:'technician-worklist-mobile',persona:'technician',title:'Modality Worklist',surface:'Mobile',prompt:`Imaging/biomedical technician worklist, mobile. A list of scheduled studies: patient name, MRN (tabular figures), modality (CT/MRI/X-Ray/US), ordering doctor, priority chip (STAT in red with icon), and status (Scheduled, Acquired, Reported). Tapping a study opens a capture screen: study details, a device QC checklist with checkboxes, and a blue (brand) "Mark acquired / upload to PACS" button. Big touch targets, 16px, high contrast.`},
{id:'maintenance-workorders-mobile',persona:'maintenance',title:'Work-Order Queue',surface:'Mobile',prompt:`Maintenance staff work-order queue, mobile. A list of work-order cards: title, asset name + location, type (Corrective/Preventive/Inspection), priority chip (icon+color), and status (Open, Assigned, In progress, Closed). A filter row (My orders / All / Due today). Tapping opens a detail: asset info, description, a photo-capture button, status update control, and a blue (brand) "Close work order" button. Include a small "Scan asset QR" action. Big touch targets, 16px.`},
{id:'clinic-frontdesk-web',persona:'clinic',title:'Front Desk / Check-in',surface:'Web',prompt:`Small-clinic front-desk screen, desktop. Top: today's date and a search "Find patient or appointment". A schedule table of the day's appointments (time, patient, provider, reason, status chips: Booked, Checked-in, Completed, No-show — icon+color) with a blue (brand) "Check in" action per row. A side panel for quick patient registration (name, phone, DOB) and a "Collect payment" button. A compact day-summary strip (booked / checked-in / revenue). 14px, tabular, calm.`},
{id:'ambulance-call-mobile',persona:'ambulance',title:'Active Call & Pre-Hospital',surface:'Mobile',prompt:`Ambulance crew screen, mobile. Top: active dispatch card with priority badge (STAT in red with icon), pickup address, and a map snippet with "Navigate" button. Status stepper: Dispatched → En route → At scene → Transporting. A "Pre-hospital record" section: quick vitals entry, interventions checklist, and free-text notes, with a blue (brand) "Pre-alert ED" button. Large touch targets, high-contrast for in-vehicle use, 16px.`}
];

/* ---------- generated/imported screen files (module → file) ---------- */
const GEN = {
  'patient-home-mobile':'screen/patient_home_dashboard/screen.png',
  'patient-book-mobile':'screen/doctor_booking/code.html',
  'patient-appointments-mobile':'screen/patient_appointments/code.html',
  'patient-records-mobile':'screen/health_records/code.html',
  'patient-profile-mobile':'screen/patient_profile_settings/code.html',
  'patient-meds-mobile':'screen/medications/code.html',
  'patient-payments-mobile':'screen/patient_payments/code.html',
  'patient-telemed-mobile':'screen/telemedicine_lobby/code.html',
  'patient-consult-mobile':'screen/active_consultation/code.html',
  'patient-visit-summary-mobile':'screen/visit_summary/code.html',
  'doctor-chart-web':'screen/clinician_ehr_patient_chart_updated_summary/code.html',
  'doctor-schedule-web':'screen/doctor_s_daily_schedule/code.html',
};

/* ---------- audit state (localStorage) ---------- */
const AKEY='ghp-audit-v1';
const audit = JSON.parse(localStorage.getItem(AKEY)||'{}');
function saveAudit(){localStorage.setItem(AKEY,JSON.stringify(audit));}
function getStatus(id){return (audit[id]&&audit[id].status)||'pending';}

/* ---------- helpers ---------- */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}
function copy(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard')).catch(()=>fallbackCopy(text));}
  else fallbackCopy(text);
}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Copied to clipboard');}catch(e){toast('Press Ctrl/Cmd+C to copy');}document.body.removeChild(ta);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fullPrompt(s){return DS_PROMPT+'\n\n=== SCREEN ===\n\n'+s.prompt;}

/* ---------- sidebar ---------- */
function buildNav(){
  const nav=document.getElementById('nav');
  let h='';
  h+=`<a class="item" data-route="schema"># Database Schema</a>`;
  h+=`<a class="item" data-route="design"># Design System</a>`;
  h+=`<div class="group">Screen Prompts</div>`;
  PERSONAS.forEach(p=>{
    const scr=SCREENS.filter(s=>s.persona===p.key);
    h+=`<a class="item pgroup" data-route="batch:${p.key}">▸ ${p.label}${scr.length>1?` <span style="color:var(--n400);font-weight:500">(${scr.length})</span>`:''}</a>`;
    scr.forEach(s=>{
      const st=getStatus(s.id);
      h+=`<a class="item sub" data-route="screen:${s.id}">${s.title}<span class="stdot ${st}"></span></a>`;
    });
  });
  nav.innerHTML=h;
  nav.querySelectorAll('a').forEach(a=>a.onclick=()=>go(a.dataset.route));
}

/* ---------- views ---------- */
function setActive(route){document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));}

function go(route){
  setActive(route);
  const v=document.getElementById('view');
  if(route==='schema'){v.innerHTML=`<iframe class="full" src="schema.html"></iframe>`;return;}
  if(route==='design'){v.innerHTML=designView();return;}
  if(route.startsWith('batch:')){v.innerHTML=batchView(route.split(':')[1]);wire(v);return;}
  if(route.startsWith('screen:')){v.innerHTML=screenView(route.split(':')[1]);wire(v);return;}
}

function designView(){
  const sw=[['primary/600','#1D4ED8','brand'],['primary/500','#2563EB','actions'],['primary/100','#DBEAFE','tint'],['accent','#15AABF','accent'],
    ['critical','#B42318','danger'],['warning','#B54708','warn'],['success','#067647','ok'],['info','#175CD3','info'],
    ['heading','#1E293B','text'],['body','#334155','text'],['border','#E2E8F0','line']];
  return `<div class="wrap">
    <h1>Design System</h1><div class="crumb">Prepend this prompt to every screen prompt · default theme Medical Blue (brand)</div>
    <div class="card"><h3>Palette</h3><div class="swatches">${sw.map(s=>`<div class="sw"><div class="c" style="background:${s[1]}"></div><div class="l"><b>${s[0]}</b><span>${s[1]}</span></div></div>`).join('')}</div></div>
    <div class="card"><h3>Design-system prompt</h3><pre class="prompt" id="dsp">${esc(DS_PROMPT)}</pre>
      <div class="btnrow"><button class="b" onclick="copy(DS_PROMPT)">Copy design-system prompt</button></div>
      <div class="hint">Clinical status colors are <b>locked</b>; only the blue (brand) brand color is tenant-overridable.</div>
    </div></div>`;
}

function previewStage(s){
  const file = GEN[s.id] || `generated/${s.id}.html`;
  const has = !!GEN[s.id];
  const frame = s.surface==='Mobile'
    ? `<div class="phone"><iframe id="frame-${s.id}" ${has?`src="${file}"`:''}></iframe></div>`
    : `<div class="browser"><div class="bbar"><i style="background:#FF5F57"></i><i style="background:#FEBC2E"></i><i style="background:#28C840"></i><div class="u">${esc(file)}</div></div><iframe id="frame-${s.id}" ${has?`src="${file}"`:''}></iframe></div>`;
  return `<div class="card"><h3>Live preview &nbsp;<span class="pill ${s.surface==='Mobile'?'m':'w'}">${s.surface}</span>${has?` <span style="font-size:11px;color:var(--n500);font-weight:400">· ${esc(file)}</span>`:''}</h3>
    <div class="stage" id="stage-${s.id}">
      <div class="ph-empty" id="empty-${s.id}" style="${has?'display:none':''}"><b>No screen yet.</b>
      <div>Save the export to<br><code>preview/${file}</code> then click Load.</div></div>
      ${frame}
    </div>
    <div class="btnrow">
      <button class="b" data-load="${s.id}">Load / Reload preview</button>
      <button class="b ghost" data-clear="${s.id}">Clear</button>
    </div></div>`;
}

function auditBlock(s){
  const a=audit[s.id]||{};const st=a.status||'pending';
  return `<div class="card"><h3>Audit sign-off</h3>
    <div class="audit"><div class="seg" data-audit="${s.id}">
      <button data-v="pending" class="${st==='pending'?'on':''}">Pending</button>
      <button data-v="changes" class="${st==='changes'?'on':''}">Needs changes</button>
      <button data-v="approved" class="${st==='approved'?'on':''}">Approved</button>
    </div></div>
    <textarea class="notes" id="notes-${s.id}" placeholder="Review notes (saved locally)…">${esc(a.notes||'')}</textarea></div>`;
}

function screenView(id){
  const s=SCREENS.find(x=>x.id===id);const persona=PERSONAS.find(p=>p.key===s.persona).label;
  const fp=fullPrompt(s);
  const other = s.surface==='Mobile'?'web':'mobile';
  return `<div class="wrap">
    <h1>${persona} — ${s.title} <span class="pill ${s.surface==='Mobile'?'m':'w'}">${s.surface}</span></h1>
    <div class="crumb">Paste into Google Stitch (design-system prompt is already included below) · drop file id: <code>${s.id}</code></div>
    <div class="card"><h3>Full prompt (design system + screen)</h3>
      <pre class="prompt" id="p-${s.id}">${esc(fp)}</pre>
      <div class="btnrow">
        <button class="b" data-copy="${s.id}">Copy full prompt</button>
        <button class="b ghost" data-copyvar="${s.id}">Copy + request ${other} variant</button>
        <button class="b ghost" data-copyscreen="${s.id}">Copy screen-only</button>
      </div>
    </div>
    ${previewStage(s)}
    ${auditBlock(s)}
  </div>`;
}

function batchView(key){
  const p=PERSONAS.find(x=>x.key===key);const scr=SCREENS.filter(s=>s.persona===key);
  const batch=DS_PROMPT+`\n\n=== BATCH: generate these ${scr.length} ${p.label} screen(s) as a consistent set ===\n\n`+
    scr.map((s,i)=>`(${i+1}) [${s.surface}] ${s.title}:\n${s.prompt}`).join('\n\n');
  return `<div class="wrap">
    <h1>${p.label} — batch prompt</h1>
    <div class="crumb">One prompt that asks Stitch to generate all ${p.label} screens together (keeps them visually consistent).</div>
    <div class="card"><h3>Batch prompt</h3><pre class="prompt">${esc(batch)}</pre>
      <div class="btnrow"><button class="b" onclick='copy(${JSON.stringify(batch)})'>Copy batch prompt</button></div>
    </div>
    <div class="card"><h3>Screens in this batch</h3>${scr.map(s=>`<div style="padding:6px 0"><a data-route="screen:${s.id}" onclick="go('screen:${s.id}')"><b>${s.title}</b></a> <span class="pill ${s.surface==='Mobile'?'m':'w'}">${s.surface}</span></div>`).join('')}</div>
  </div>`;
}

/* ---------- wire interactions on a rendered view ---------- */
function wire(v){
  v.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{const s=SCREENS.find(x=>x.id===b.dataset.copy);copy(fullPrompt(s));});
  v.querySelectorAll('[data-copyscreen]').forEach(b=>b.onclick=()=>{const s=SCREENS.find(x=>x.id===b.dataset.copyscreen);copy(s.prompt);});
  v.querySelectorAll('[data-copyvar]').forEach(b=>b.onclick=()=>{const s=SCREENS.find(x=>x.id===b.dataset.copyvar);const other=s.surface==='Mobile'?'web (desktop)':'mobile';copy(fullPrompt(s)+`\n\nAlso produce a companion ${other} layout of this same screen using the identical design system.`);});
  v.querySelectorAll('[data-load]').forEach(b=>b.onclick=()=>{const id=b.dataset.load;const f=document.getElementById('frame-'+id);f.src=GEN[id]||('generated/'+id+'.html');f.style.display='block';const e=document.getElementById('empty-'+id);if(e)e.style.display='none';});
  v.querySelectorAll('[data-clear]').forEach(b=>b.onclick=()=>{const id=b.dataset.clear;const f=document.getElementById('frame-'+id);f.src='about:blank';const e=document.getElementById('empty-'+id);if(e)e.style.display='flex';});
  v.querySelectorAll('[data-audit]').forEach(seg=>{const id=seg.dataset.audit;seg.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{
    audit[id]=audit[id]||{};audit[id].status=btn.dataset.v;saveAudit();
    seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));buildNav();setActive('screen:'+id);
    toast('Saved: '+btn.dataset.v);});});
  v.querySelectorAll('textarea.notes').forEach(t=>{const id=t.id.replace('notes-','');t.onchange=()=>{audit[id]=audit[id]||{};audit[id].notes=t.value;saveAudit();toast('Notes saved');};});
}

/* ---------- boot ---------- */
buildNav();
go('schema');
</script>
</body>
</html>
