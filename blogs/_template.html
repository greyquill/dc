<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>(function(){try{var k='gq-blog-theme',t=localStorage.getItem(k);if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

  <!-- Fill per post. Keep {{SLUG}} identical to the filename (blogs/{{SLUG}}.html). -->
  <title>{{TITLE}} — Greyquill</title>
  <meta name="description" content="{{DECK}}">
  <meta name="author" content="{{AUTHOR}}"><!-- attribution/metadata only; not shown in the header -->
  <link rel="canonical" href="https://www.greyquill.io/dc/blogs/{{SLUG}}.html">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DECK}}">
  <meta property="og:url" content="https://www.greyquill.io/dc/blogs/{{SLUG}}.html">
  <meta property="og:site_name" content="Greyquill">
  <meta property="article:section" content="{{CATEGORY}}">
  <meta property="article:author" content="{{AUTHOR}}">
  <meta property="og:image" content="https://www.greyquill.io/dc/blogs/assets/{{SLUG}}-og.png"><!-- optional 1200x630; else delete -->
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="assets/blog.css">
</head>
<body>
  <header class="site-bar">
    <div class="site-bar__inner">
      <div class="site-bar__brand">
        <a class="wordmark" href="https://www.greyquill.io/">Greyquill</a>
        <span class="site-bar__tag">Software Investments That Actually Deliver.</span>
      </div>
      <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle light or dark mode" title="Toggle light or dark mode">
        <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main class="post">
    <p class="eyebrow">{{CATEGORY}}</p>
    <h1 class="post__title">{{TITLE}}</h1>
    <p class="post__deck">{{DECK}}</p>

    <div class="post__headmeta">
      <span class="post__datetime">{{DATETIME}}</span>
      <div class="share" aria-label="Share this article">
        <span class="share__label">Share</span>
        <a class="share__btn" data-share="linkedin" target="_blank" rel="noopener" aria-label="Share on LinkedIn"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95C20.3 8.75 21 11 21 14.1V21h-4v-6.1c0-1.45-.03-3.3-2-3.3-2 0-2.3 1.56-2.3 3.2V21H9z"/></svg></a>
        <a class="share__btn" data-share="x" target="_blank" rel="noopener" aria-label="Share on X"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.5 3h3l-6.6 7.5L21.8 21h-6.1l-4.3-5.6L6.4 21H3.3l7-8L2.6 3h6.2l3.9 5.2zM16.4 19.2h1.7L7.7 4.7H5.9z"/></svg></a>
        <a class="share__btn" data-share="facebook" target="_blank" rel="noopener" aria-label="Share on Facebook"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V7.9c0-.9.25-1.5 1.55-1.5H17V3.6c-.3-.04-1.3-.13-2.47-.13-2.44 0-4.11 1.49-4.11 4.23v2.36H7.7V13h2.72v8z"/></svg></a>
        <a class="share__btn" data-share="email" aria-label="Share by email"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></a>
        <button class="share__btn" data-share="copy" type="button" aria-label="Copy link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg></button>
      </div>
    </div>

    <article class="post__body">
      <!-- BODY START -->
      {{BODY}}
      <!-- BODY END -->
    </article>
  </main>

  <footer class="post-footer">
    <strong>Greyquill</strong> helps regulated enterprises get AI to actually work:
    structure and clean data for AI compatibility first, then deploy governed,
    domain-specific agents on top. <a href="https://www.greyquill.io/">greyquill.io</a>
  </footer>

  <script src="assets/blog.js"></script>
</body>
</html>
